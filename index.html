<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SGG · Sistema de Gestión de Gastos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="theme-bar">
    <span class="theme-bar__logo">◈ SGG</span>

    <div class="theme-bar__toggle-wrap">

        <span>☀</span>

      <button
    id="themeToggle"
    class="theme-switch"
    aria-label="Cambiar entre modo claro y oscuro"
    title="Cambiar tema">

            <span class="theme-switch__thumb"></span>

        </button>


        <span>☾</span>

    </div>
</div>

<main class="scene">

    <header class="brand">

        <div class="brand__ornament">

            <span class="ornament-line"></span>

            <span>◈</span>

            <span class="ornament-line"></span>

        </div>

        <h1 class="brand__name">
            SISTEMA DE GESTIÓN DE GASTOS
        </h1>

    </header>

    <div class="card">

        <div id="globalMsg" class="msg-zone"></div>

        <div id="welcomeBox" class="welcome-box" hidden>

            <h2 id="welcomeTitle"></h2>

            <p>
                Has iniciado sesión correctamente.
            </p>

            <p>
                Bienvenido/a al Sistema de Gestión de Gastos.
            </p>

        </div>

        <section id="panelLogin">

            <div class="panel__header">

                <h2 class="panel__title">
                    Bienvenido/a
                </h2>

                <p class="panel__sub">
                    Ingrese sus credenciales
                </p>

                <p class="panel__sub">
                    Usuario 1:
                    usuario1@gmail.com /
                    Usuario.1
                </p>

                <p class="panel__sub">
                    Usuario 2:
                    usuario2@gmail.com /
                    Usuario.2
                </p>

            </div>

            <form id="formLogin">

                <div class="field">

                    <label class="field__label">
                        Correo Electrónico
                    </label>

                    <input
                        type="email"
                        id="loginEmail"
                        class="field__input"
                        placeholder="correo@ejemplo.com">

                    <span
                        id="errLoginEmail"
                        class="field__err">
                    </span>

                </div>

                <div class="field">

                    <label class="field__label">
                        Contraseña
                    </label>

                    <div class="field__row">

                        <input
                            type="password"
                            id="loginPass"
                            class="field__input"
                            placeholder="••••••••">

                        <button
                            type="button"
                            class="field__eye"
                            data-target="loginPass">

                            👁

                        </button>

                    </div>

                    <span
                        id="errLoginPass"
                        class="field__err">
                    </span>

                </div>

                <button
                    type="submit"
                    class="btn-cta">

                    Iniciar sesión

                </button>

            </form>

        </section>

    </div>

</main>

<script src="login.js"></script>

</body>
</html>
